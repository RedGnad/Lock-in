[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["node_modules", "lib"]
auto_detect_solc = true
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
# Monad raises the CREATE/CREATE2 contract-size limit to 128 KiB. Keep this
# explicit so upstream Foundry uses the target chain's limit in `--sizes` CI.
code_size_limit = 131072
# Real captured proofs bind a personal wallet to a personal Strava/Duolingo account, so they are NOT
# committed. They live in a gitignored private directory; the real-proof tests skip when it is absent, and
# the synthetic suites keep the grammar covered in public CI.
fs_permissions = [{ access = "read", path = "./private-fixtures" }]

[rpc_endpoints]
monad = "${MONAD_RPC_URL}"
